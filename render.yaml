services:
  # Spring Boot Backend
  - type: web
    name: tribalart-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar

  # React Frontend
  - type: web
    name: tribalart-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tribalart-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
